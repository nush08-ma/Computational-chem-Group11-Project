<!-- Quantum Suite — JS Enhancements & Animations -->
<style>
/* ── Orbit rings in header ── */
.orbit-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(56,189,248,0.18);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.orbit-ring.r1 { width: 120px; height: 120px; animation: spin 6s linear infinite; }
.orbit-ring.r2 { width: 200px; height: 200px; animation: spin 10s linear infinite reverse; }
.orbit-ring.r3 { width: 290px; height: 290px; animation: spin 16s linear infinite; }
.orbit-ring::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  background: #38bdf8;
  border-radius: 50%;
  top: -4px; left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
}
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* ── Typewriter cursor blink ── */
.suite-title { position: relative; }

/* ── Counter number roll ── */
@keyframes countRoll {
  from { opacity: 0; transform: translateY(12px) scale(0.85); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}

/* ── Card shimmer sweep ── */
@keyframes shimmerSweep {
  0%   { transform: skewX(-20deg) translateX(-150%); }
  100% { transform: skewX(-20deg) translateX(150%); }
}

/* ── Pulse dot on active tab ── */
.tab-active-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: #38bdf8;
  border-radius: 50%;
  margin-left: 5px;
  vertical-align: middle;
  animation: dotPulse 1.4s ease-in-out infinite;
}
@keyframes dotPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(56,189,248,0.7); }
  50%       { box-shadow: 0 0 0 6px rgba(56,189,248,0); }
}

/* ── Glowing border on hover for charts ── */
[data-testid="stPlotlyChart"]:hover {
  box-shadow: 0 0 0 1px rgba(56,189,248,0.4),
              0 12px 48px rgba(0,0,0,0.5) !important;
}
</style>

<script>
(function () {
  'use strict';

  /* ══════════════════════════════════════
     1. PARTICLE NETWORK BACKGROUND
  ══════════════════════════════════════ */
  function initParticleCanvas() {
    if (document.getElementById('qc-bg')) return;
    const canvas = document.createElement('canvas');
    canvas.id = 'qc-bg';
    Object.assign(canvas.style, {
      position: 'fixed', top: '0', left: '0',
      width: '100vw', height: '100vh',
      pointerEvents: 'none', zIndex: '0', opacity: '0.4',
    });
    document.body.prepend(canvas);

    const ctx = canvas.getContext('2d');
    let W = canvas.width  = window.innerWidth;
    let H = canvas.height = window.innerHeight;

    const NUM  = 70;
    const DIST = 130;
    const pts  = Array.from({ length: NUM }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.45,
      vy: (Math.random() - 0.5) * 0.45,
      r: Math.random() * 1.6 + 0.4,
      a: Math.random() * 0.5 + 0.15,
    }));

    function tick() {
      ctx.clearRect(0, 0, W, H);
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;
      });
      // connections
      for (let i = 0; i < NUM; i++) {
        for (let j = i + 1; j < NUM; j++) {
          const dx = pts[i].x - pts[j].x;
          const dy = pts[i].y - pts[j].y;
          const d  = Math.hypot(dx, dy);
          if (d < DIST) {
            const op = (1 - d / DIST) * 0.22;
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(56,189,248,${op})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      // dots
      pts.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(56,189,248,${p.a})`;
        ctx.fill();
      });
      requestAnimationFrame(tick);
    }
    tick();
    window.addEventListener('resize', () => {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    });
  }

  /* ══════════════════════════════════════
     2. CURSOR GLOW
  ══════════════════════════════════════ */
  function initCursorGlow() {
    if (document.getElementById('qc-cursor')) return;
    const g = document.createElement('div');
    g.id = 'qc-cursor';
    Object.assign(g.style, {
      position: 'fixed', width: '220px', height: '220px',
      borderRadius: '50%',
      background: 'radial-gradient(circle, rgba(56,189,248,0.07) 0%, transparent 70%)',
      pointerEvents: 'none', zIndex: '9998',
      transform: 'translate(-50%,-50%)',
      transition: 'opacity .3s',
      mixBlendMode: 'screen',
    });
    document.body.appendChild(g);
    document.addEventListener('mousemove', e => {
      g.style.left = e.clientX + 'px';
      g.style.top  = e.clientY + 'px';
    });
    document.addEventListener('mouseleave', () => g.style.opacity = '0');
    document.addEventListener('mouseenter', () => g.style.opacity = '1');
  }

  /* ══════════════════════════════════════
     3. CARD SHIMMER ON HOVER
  ══════════════════════════════════════ */
  function initCardShimmer() {
    const obs = new MutationObserver(() => {
      document.querySelectorAll(
        '.info-card:not([data-sh]), .foundation-card:not([data-sh]), .module-card:not([data-sh])'
      ).forEach(card => {
        card.dataset.sh = '1';
        const shine = document.createElement('span');
        shine.style.cssText = `
          position:absolute; top:0; left:-100%; width:60%; height:100%;
          background: linear-gradient(
            120deg, transparent 30%,
            rgba(255,255,255,0.06) 50%,
            transparent 70%);
          transform: skewX(-20deg);
          pointer-events: none;
          transition: none;
        `;
        card.style.position = 'relative';
        card.style.overflow  = 'hidden';
        card.appendChild(shine);
        card.addEventListener('mouseenter', () => {
          shine.style.transition = 'left 0.55s ease';
          shine.style.left = '160%';
        });
        card.addEventListener('mouseleave', () => {
          shine.style.transition = 'none';
          shine.style.left = '-100%';
        });
      });
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  /* ══════════════════════════════════════
     4. RIPPLE CLICK EFFECT
  ══════════════════════════════════════ */
  function initRipple() {
    const obs = new MutationObserver(() => {
      document.querySelectorAll(
        '.module-card:not([data-rpl]), [data-testid="stButton"] button:not([data-rpl])'
      ).forEach(el => {
        el.dataset.rpl = '1';
        el.style.position = 'relative';
        el.style.overflow  = 'hidden';
        el.addEventListener('click', function (e) {
          const rect = this.getBoundingClientRect();
          const span = document.createElement('span');
          Object.assign(span.style, {
            position: 'absolute',
            borderRadius: '50%',
            width: '6px', height: '6px',
            background: 'rgba(56,189,248,0.55)',
            left: (e.clientX - rect.left) + 'px',
            top:  (e.clientY - rect.top)  + 'px',
            transform: 'scale(0)',
            animation: 'qcRipple 0.55s ease-out forwards',
            pointerEvents: 'none',
          });
          this.appendChild(span);
          setTimeout(() => span.remove(), 560);
        });
      });
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  /* ══════════════════════════════════════
     5. STAT NUMBER COUNT-UP ANIMATION
  ══════════════════════════════════════ */
  function initCountUp() {
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const el  = entry.target;
        const txt = el.textContent.trim();
        const num = parseFloat(txt);
        if (isNaN(num)) return;
        io.unobserve(el);
        const isFloat   = txt.includes('.');
        const decimals  = isFloat ? (txt.split('.')[1] || '').length : 0;
        const suffix    = txt.replace(/[\d.]/g, '');
        const duration  = 900;
        const start     = performance.now();
        function frame(now) {
          const t = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          el.textContent = (num * ease).toFixed(decimals) + suffix;
          if (t < 1) requestAnimationFrame(frame);
          else el.textContent = txt;
        }
        requestAnimationFrame(frame);
      });
    }, { threshold: 0.4 });

    const obs = new MutationObserver(() => {
      document.querySelectorAll('.stat-val:not([data-cu])').forEach(el => {
        el.dataset.cu = '1';
        io.observe(el);
      });
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  /* ══════════════════════════════════════
     6. ACTIVE TAB PULSE DOT
  ══════════════════════════════════════ */
  function initTabDot() {
    const obs = new MutationObserver(() => {
      document.querySelectorAll('[role="tab"]').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab-active-dot').forEach(d => d.remove());
          const dot = document.createElement('span');
          dot.className = 'tab-active-dot';
          tab.appendChild(dot);
        });
      });
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  /* ══════════════════════════════════════
     7. TEAM MEMBER AVATAR TILT
  ══════════════════════════════════════ */
  function initAvatarTilt() {
    const obs = new MutationObserver(() => {
      document.querySelectorAll('.member-avatar:not([data-tlt])').forEach(av => {
        av.dataset.tlt = '1';
        av.parentElement.addEventListener('mouseenter', () => {
          av.style.transform = 'rotate(12deg) scale(1.15)';
          av.style.boxShadow = '0 4px 22px rgba(56,189,248,0.55)';
          av.style.transition = 'transform .3s, box-shadow .3s';
        });
        av.parentElement.addEventListener('mouseleave', () => {
          av.style.transform = '';
          av.style.boxShadow = '';
        });
      });
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  /* ══════════════════════════════════════
     8. FORMULA CHIP BOUNCE
  ══════════════════════════════════════ */
  function initChipBounce() {
    const obs = new MutationObserver(() => {
      document.querySelectorAll('.formula-chip:not([data-bnc])').forEach((chip, i) => {
        chip.dataset.bnc = '1';
        chip.style.animationDelay = `${i * 0.12}s`;
        chip.addEventListener('mouseenter', () => {
          chip.style.animation = 'chipBounce 0.4s ease';
        });
        chip.addEventListener('animationend', () => {
          chip.style.animation = '';
        });
      });
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  /* ══════════════════════════════════════
     10. MODULE CARD → TAB NAVIGATION
         + ENHANCED HOVER ANIMATIONS
  ══════════════════════════════════════ */
  function initModuleCardNav() {
    function clickTab(idx) {
      // Streamlit renders tabs as [role="tab"] inside [data-baseweb="tab-list"]
      const tabs = document.querySelectorAll('[data-baseweb="tab-list"] [role="tab"]');
      if (tabs[idx]) {
        tabs[idx].click();
        // Smooth scroll to top of content area
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    const obs = new MutationObserver(() => {
      document.querySelectorAll('.module-card[data-tab]:not([data-nav])').forEach(card => {
        card.dataset.nav = '1';
        const tabIdx = parseInt(card.dataset.tab);

        // ── Click to navigate ──
        card.addEventListener('click', () => clickTab(tabIdx));

        // ── Hover: tilt + glow border trace ──
        card.addEventListener('mouseenter', () => {
          card.style.transition = 'transform 0.28s cubic-bezier(.34,1.56,.64,1), box-shadow 0.28s ease, border-color 0.2s';
          card.style.transform  = 'translateX(6px) scale(1.012)';
          card.style.boxShadow  = '0 0 0 1px rgba(56,189,248,0.5), 0 8px 32px rgba(56,189,248,0.15), inset 0 0 20px rgba(56,189,248,0.04)';
          card.style.borderColor = 'rgba(56,189,248,0.6)';

          // Animate the module number ghost
          const num = card.querySelector('.module-num');
          if (num) {
            num.style.transition = 'color 0.25s, transform 0.25s';
            num.style.color = 'rgba(56,189,248,0.55)';
            num.style.transform = 'scale(1.08)';
          }

          // Slide the arrow in
          const arrow = card.querySelector('.module-arrow');
          if (arrow) {
            arrow.style.transition = 'color 0.2s, transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.2s';
            arrow.style.color     = '#38bdf8';
            arrow.style.transform = 'translateX(6px)';
            arrow.style.opacity   = '1';
            arrow.style.textShadow = '0 0 8px rgba(56,189,248,0.8)';
          }
        });

        card.addEventListener('mouseleave', () => {
          card.style.transform   = '';
          card.style.boxShadow   = '';
          card.style.borderColor = '';

          const num = card.querySelector('.module-num');
          if (num) { num.style.color = ''; num.style.transform = ''; }

          const arrow = card.querySelector('.module-arrow');
          if (arrow) {
            arrow.style.color      = '';
            arrow.style.transform  = '';
            arrow.style.textShadow = '';
          }
        });

        // ── Mousedown press feedback ──
        card.addEventListener('mousedown', () => {
          card.style.transform  = 'translateX(4px) scale(0.985)';
          card.style.transition = 'transform 0.1s ease';
        });
        card.addEventListener('mouseup', () => {
          card.style.transform  = 'translateX(6px) scale(1.012)';
          card.style.transition = 'transform 0.18s ease';
        });
      });
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  /* ══════════════════════════════════════
     9. INJECT KEYFRAMES
  ══════════════════════════════════════ */
  function injectKeyframes() {
    const s = document.createElement('style');
    s.textContent = `
      @keyframes qcRipple {
        to { transform: scale(90); opacity: 0; }
      }
      @keyframes chipBounce {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.22) translateY(-4px); }
        70%  { transform: scale(0.95) translateY(2px); }
        100% { transform: scale(1); }
      }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .tab-body > * {
        animation: fadeSlideUp 0.38s ease both;
      }
      .tab-body > *:nth-child(2) { animation-delay: 0.07s; }
      .tab-body > *:nth-child(3) { animation-delay: 0.14s; }
      .tab-body > *:nth-child(4) { animation-delay: 0.21s; }

      /* Slider thumb glow */
      [data-baseweb="slider"] [role="slider"]:focus,
      [data-baseweb="slider"] [role="slider"]:active {
        box-shadow: 0 0 0 4px rgba(56,189,248,0.35),
                    0 0 16px rgba(56,189,248,0.55) !important;
      }
      /* Metric value pop */
      [data-testid="stMetricValue"] {
        animation: fadeSlideUp 0.45s ease both;
      }
      /* Plotly chart fade-in */
      [data-testid="stPlotlyChart"] {
        animation: fadeSlideUp 0.5s ease both;
      }

      /* Module card click cursor */
      .module-card[data-tab] { cursor: pointer !important; }

      /* Module card arrow base state */
      .module-arrow {
        opacity: 0.3;
        transition: color 0.2s, transform 0.3s, opacity 0.2s;
      }

      /* Module card number base */
      .module-num {
        transition: color 0.25s, transform 0.25s;
      }

      @keyframes moduleCardPop {
        0%   { transform: translateX(6px) scale(1.012); }
        40%  { transform: translateX(2px) scale(0.988); }
        100% { transform: translateX(6px) scale(1.012); }
      }
    `;
    document.head.appendChild(s);
  }

  /* ══════════════════════════════════════
     BOOT
  ══════════════════════════════════════ */
  function boot() {
    injectKeyframes();
    initParticleCanvas();
    initCursorGlow();
    initCardShimmer();
    initRipple();
    initCountUp();
    initTabDot();
    initAvatarTilt();
    initChipBounce();
    initModuleCardNav();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
